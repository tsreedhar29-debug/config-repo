server:
  port: 8087

spring:
  application:
    name: theatre-service
  datasource:
    # URL for the JDBC driver, specifying the host, port (default 3306), and database name
    url: jdbc:mysql://localhost:3306/bookingdb?serverTimezone=UTC
    username: root # e.g., root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver # The correct MySQL driver class
  jpa:
    # JPA (Hibernate) specific configurations
    hibernate:
      ddl-auto: update # Options: none, update, create, create-drop
    show-sql: true # Log SQL queries to the console
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  sql:
    init:
      mode: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

