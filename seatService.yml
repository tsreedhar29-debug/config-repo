server:
  port: 8083
spring:
  datasource:
    # URL for the JDBC driver, specifying the host, port (default 3306), and database name
    url: jdbc:mysql://localhost:3306/bookingdb?serverTimezone=UTC
    username: root # e.g., root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver # The correct MySQL driver class
  jpa:
    # JPA (Hibernate) specific configurations
    hibernate:
      ddl-auto: update # Options: none, update, create, create-drop
    show-sql: true # Log SQL queries to the console
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0   # trace all requests (dev only)
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
